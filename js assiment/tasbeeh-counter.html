<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasbeeh Counter - الْحَمْدُ لِلَّهِ | سُبْحَانَ اللَّهِ | اللَّهُ أَكْبَرُ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            font-family: 'Arial', sans-serif;
            color: #333;
            overflow: hidden;
        }
        .header {
            font-size: 2.5rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            text-align: center;
        }
        .tasbeeh-container {
            text-align: center;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 3px solid rgba(255,255,255,0.4);
        }
        
        
        .dhikr-image.glow {
            box-shadow: 0 0 50px rgba(255,255,255,0.8), 0 15px 30px rgba(0,0,0,0.3);
            transform: scale(1.05);
        }
        .dhikr-text {
            font-size: 2.8rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .counter {
            font-size: 6rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            font-family: 'Courier New', monospace;
        }
        .target {
            color: rgba(255,255,255,0.8);
            
            font-size: 1.5rem;
            margin-bottom: 20px;
            
        }
        .button-container {
            display: flex;
            gap: 20px;
        }
        button {
            padding: 20px 40px;
            font-size: 1.8rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .count-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            min-width: 120px;
        }
        .count-btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .reset-btn {
            background: linear-gradient(45deg, #48cae4, #023e8a);
            color: white;
        }
        .reset-btn:hover {
            transform: translateY(-2px);
        }
        .progress {
            width: 300px;
            height: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
            overflow: hidden;
            margin-top: 20px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="header">🔮Tasbeeh Counter🔮</div>
    
    <div class="tasbeeh-container">
        
        
        <div id="dhikrText" class="dhikr-text">الْحَمْدُ لِلَّهِ</div>
        
        <div id="counter" class="counter">0</div>
        
        <div id="target" class="target">Target: 33</div>
        
        <div class="progress">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        <br>
        <br>

        <div class="button-container">
            <button id="countBtn" class="count-btn">Click ☝️</button>
            <button id="resetBtn" class="resetBtn">Reset</button>
        </div>
    </div>

    <script>
        let dhikr = [
            {
                text: 'الْحَمْدُ لِلَّهِ',
                image: 'https://via.placeholder.com/200/4a90e2/ffffff?text=الحمدلله',
                target: 33,
                ar: 'Alhamdulillah'
            },
            {
                text: 'سُبْحَانَ اللَّهِ',
                image: 'https://via.placeholder.com/200/45b7d1/ffffff?text=سبحان الله',
                target: 33,
                ar: 'SubhanAllah'
            },
            {
                text: 'اللَّهُ أَكْبَرُ',
                image: 'https://via.placeholder.com/200/f39c12/ffffff?text=الله أكبر',
                target: 34,
                ar: 'Allahu Akbar'
            }
        ];

        let currentDhikr = 0;
        let count = 0;
        let interval;

       
        let dhikrText = document.getElementById('dhikrText');
        let counter = document.getElementById('counter');
        let target = document.getElementById('target');
        let countBtn = document.getElementById('countBtn');
        let resetBtn = document.getElementById('resetBtn');
        let progressFill = document.getElementById('progressFill');

        function  updateDisplay() {
            let item = dhikr[currentDhikr];
            dhikrText.textContent = item.text;
            dhikrImg.src = item.image;
            target.textContent = `Target: ${item.target}`;
            counter.textContent = count;
            
            let progress = (count / item.target) * 100;
            progressFill.style.width = Math.min(progress, 100) + '%';
            progressFill.style.alignItems = 'center';
            
        }

        function nextDhikr() {
            let item = dhikr[currentDhikr];
            if (count >= item.target) {
                currentDhikr = (currentDhikr + 1) % dhikr.length;
                count = 0;
                updateDisplay();
            }
        }

        countBtn.addEventListener('click', () => {
            count++;
            counter.textContent = count;
            
            // Vibration effect (if supported)
            if (navigator.vibrate) navigator.vibrate(50);
            
            let item = dhikr[currentDhikr];
            let progress = (count / item.target) * 100;
            progressFill.style.width = Math.min(progress, 100) + '%';
            
            // Auto next dhikr
            nextDhikr();
        });

        resetBtn.addEventListener('click', () => {
            count = 0;
            currentDhikr = 0;
            progressFill.style.width = '0%';
            updateDisplay();
        });

        // Initial display
        updateDisplay();
    </script>
</body>
</html>
