<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .weather-app {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            color: white;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #fff, rgba(255,255,255,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }
        #cityInput {
            flex: 1;
            max-width: 250px;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.2);
            color: white;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        #cityInput::placeholder {
            color: rgba(255,255,255,0.7);
        }
        #cityInput:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
        }
        #searchBtn {
            padding: 15px 30px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255,107,107,0.4);
        }
        #searchBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,107,107,0.6);
        }
        #weatherInfo {
            margin-top: 30px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        #weatherInfo.show {
            opacity: 1;
            transform: translateY(0);
        }
        .weather-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .temp {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .condition {
            font-size: 1.5rem;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 20px;
            font-size: 1rem;
        }
        .detail-item {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }
        .api-key-section {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .api-key-section strong {
            color: #ffeb3b;
        }
        .loading {
            font-size: 1.2rem;
            margin-top: 20px;
        }
        .error {
            color: #ff6b6b;
            margin-top: 20px;
            display: none;
        }
        @media (max-width: 480px) {
            .input-group {
                flex-direction: column;
                align-items: center;
            }
            #cityInput {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="weather-app">
        <h1>🌤️ Weather App</h1>
        
        <div class="api-key-section">
            <strong>🚀 Get Free API Key:</strong> Go to <a href="https://openweathermap.org/api" target="_blank" style="color: #4ecdc4;">openweathermap.org/api</a>, signup, copy your API key and replace below!
        </div>
        
        <textarea id="apiKey" placeholder="Paste your API key here... (e.g. ab12cd34ef56gh78ij90kl)" rows="2" style="width: 100%; padding: 10px; border-radius: 10px; border: none; margin-bottom: 20px; background: rgba(255,255,255,0.2); color: white; font-family: monospace;"></textarea>
        
        <div class="input-group">
            <input type="text" id="cityInput" placeholder="Enter city name (e.g. London, New York)" maxlength="50">
            <button id="searchBtn">Search 🌍</button>
        </div>
        
        <div id="loading" class="loading" style="display: none;">🔄 Fetching weather...</div>
        <div id="error" class="error"></div>
        
        <div id="weatherInfo">
            <div class="weather-icon" id="weatherIcon">🌤️</div>
            <div class="temp" id="temperature">--</div>
            <div class="condition" id="condition">--</div>
            <div class="details">
                <div class="detail-item">
                    <strong>Feels like</strong><br>
                    <span id="feelsLike">--°C</span>
                </div>
                <div class="detail-item">
                    <strong>Humidity</strong><br>
                    <span id="humidity">--%</span>
                </div>
                <div class="detail-item">
                    <strong>Wind</strong><br>
                    <span id="wind">-- m/s</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const weatherInfo = document.getElementById('weatherInfo');
        const loading = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const weatherIcon = document.getElementById('weatherIcon');
        const temperature = document.getElementById('temperature');
        const condition = document.getElementById('condition');
        const feelsLike = document.getElementById('feelsLike');
        const humidity = document.getElementById('humidity');
        const wind = document.getElementById('wind');

        // Weather condition icons
        const weatherIcons = {
            'Clear': '☀️',
            'Clouds': '☁️',
            'Rain': '🌧️',
            'Drizzle': '🌦️',
            'Thunderstorm': '⛈️',
            'Snow': '❄️',
            'Mist': '🌫️',
            'Fog': '🌫️',
            default: '🌤️'
        };

        searchBtn.addEventListener('click', fetchWeather);
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchWeather();
        });

        async function fetchWeather() {
            const city = cityInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!city) {
                showError('Please enter a city name!');
                return;
            }
            if (!apiKey) {
                showError('Please paste your OpenWeatherMap API key!');
                return;
            }

            loading.style.display = 'block';
            errorEl.style.display = 'none';
            weatherInfo.classList.remove('show');

            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${apiKey}&units=metric`
                );
                
                if (!response.ok) {
                    throw new Error(`City not found or API error: ${response.status}`);
                }

                const data = await response.json();
                displayWeather(data);
            } catch (error) {
                showError(error.message);
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayWeather(data) {
            const icon = weatherIcons[data.weather[0].main] || weatherIcons.default;
            
            weatherIcon.textContent = icon;
            temperature.textContent = `${Math.round(data.main.temp)}°C`;
            condition.textContent = data.weather[0].description.toUpperCase();
            feelsLike.textContent = `${Math.round(data.main.feels_like)}°C`;
            humidity.textContent = `${data.main.humidity}%`;
            wind.textContent = `${data.wind.speed} m/s`;

            weatherInfo.classList.add('show');
        }

        function showError(message) {
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        // Example usage: Load default weather for 'London' if key present (comment out)
        // if (apiKeyInput.value.trim()) {
        //     cityInput.value = 'London';
        //     fetchWeather();
        // }
    </script>
</body>
</html>
