<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App 📊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 50%, #00b894 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .counter-app {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            border-radius: 35px;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.25);
            max-width: 400px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }
        .counter-app::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s;
            opacity: 0;
        }
        .counter-app.pulse::before {
            animation: shimmer 1.5s ease-in-out;
            opacity: 1;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 40px;
            background: linear-gradient(45deg, #fff, #f8f9fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
        }
        .counter-display {
            font-size: 6rem;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            margin-bottom: 50px;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translateY(0);
            letter-spacing: 0.1em;
        }
        .counter-display.positive {
            color: #00b894;
            text-shadow: 0 0 40px #00b894;
            transform: translateY(-10px);
        }
        .counter-display.negative {
            color: #e17055;
            text-shadow: 0 0 40px #e17055;
            transform: translateY(10px);
        }
        .counter-display.zero {
            color: white;
            text-shadow: 0 0 40px rgba(255,255,255,0.8);
        }
        .buttons {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 20px 40px;
            font-size: 1.6rem;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 120px;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn.increment {
            background: linear-gradient(45deg, #00b894, #00a085);
            color: white;
        }
        .btn.increment:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0,184,148,0.6);
        }
        .btn.decrement {
            background: linear-gradient(45deg, #e17055, #d63031);
            color: white;
        }
        .btn.decrement:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(225,112,85,0.6);
        }
        .btn.reset {
            background: linear-gradient(45deg, #fdcb6e, #e17055);
            color: white;
            font-size: 1.3rem;
            padding: 15px 35px;
        }
        .btn.reset:hover {
            box-shadow: 0 15px 40px rgba(253,203,110,0.6);
        }
        .info {
            margin-top: 30px;
            font-size: 1rem;
            opacity: 0.9;
            font-style: italic;
        }
        @media (max-width: 480px) {
            .counter-display {
                font-size: 4rem;
                min-height: 110px;
            }
            h1 {
                font-size: 2.2rem;
            }
            .buttons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="counter-app" id="counterApp">
        <h1>🔢 Counter App</h1>
        
        <div id="counterDisplay" class="counter-display zero">0</div>

        <div style="margin-top: -15px; opacity: 0.95; font-style: italic;" aria-hidden="true"> </div>

        <div class="buttons">
            <button class="btn increment" id="incrementBtn">+ Increase</button>
            <button class="btn decrement" id="decrementBtn">- Decrease</button>
            <button class="btn reset" id="resetBtn">Reset = 0</button>
        </div>
        
        
    </div>

    <script>
        let counterApp = document.getElementById('counterApp');
        let counterDisplay = document.getElementById('counterDisplay');
        let incrementBtn = document.getElementById('incrementBtn');
        let decrementBtn = document.getElementById('decrementBtn');
        let resetBtn = document.getElementById('resetBtn');

        let count = parseInt(localStorage.getItem('counter')) || 0;

        function updateDisplay() {
            counterDisplay.textContent = count;
            
            counterDisplay.classList.remove('positive', 'negative', 'zero');
            counterApp.classList.remove('pulse');
            
            if (count > 0) {
                counterDisplay.classList.add('positive');
            } else if (count < 0) {
                counterDisplay.classList.add('negative');
            } else {
                counterDisplay.classList.add('zero');
            }
            
            // Shimmer effect
            counterApp.classList.add('pulse');
            
            // Vibration
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
            
            // Sound (simple beep)
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = count > 0 ? 800 : 400;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch(e) {}
            
            localStorage.setItem('counter', count);
        }

        incrementBtn.addEventListener('click', () => {
            count++;
            updateDisplay();
        });

        decrementBtn.addEventListener('click', () => {
            count--;
            updateDisplay();
        });

        resetBtn.addEventListener('click', () => {
            count = 0;
            updateDisplay();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case '+':
                case '=':
                    e.preventDefault();
                    count++;
                    updateDisplay();
                    break;
                case 'ArrowDown':
                case '-':
                    e.preventDefault();
                    count--;
                    updateDisplay();
                    break;
                case '0':
                    count = 0;
                    updateDisplay();
                    break;
            }
        });

        // Initial load
        updateDisplay();
    </script>
</body>
</html>
