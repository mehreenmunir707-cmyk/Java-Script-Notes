<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Toss App 🎰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }
        .app-container {
            text-align: center;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            border: 2px solid rgba(255,255,255,0.2);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }
        .coin {
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            background: linear-gradient(145deg, #f0f0f0, #e0e0e0);
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.3),
                inset 0 -10px 20px rgba(255,255,255,0.5),
                inset 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.1s ease;
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .coin.head {
            background: linear-gradient(145deg, #ffd700, #ffed4e);
        }
        .coin.tail {
            background: linear-gradient(145deg, #c0c0c0, #a0a0a0);
        }
        .coin.spinning {
            animation: spin 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
        }
        @keyframes spin {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            100% { transform: rotateY(1800deg) rotateX(1080deg); }
        }
        .coin::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            z-index: 1;
        }
        .result {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s ease;
        }
        .result.show {
            opacity: 1;
            transform: scale(1);
        }
        .toss-btn {
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .toss-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255,107,107,0.6);
        }
        .toss-btn:active {
            transform: scale(0.98);
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            font-size: 1.2rem;
            gap: 20px;
        }
        .stat {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            min-width: 100px;
        }
        .reset-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1rem;
            background: linear-gradient(45deg, #48cae4, #023e8a);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(72,202,228,0.4);
        }
        @media (max-width: 480px) {
            .coin {
                width: 150px;
                height: 150px;
                font-size: 3.5rem;
            }
            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>🪙 Coin Toss</h1>
        
        <div id="coin" class="coin">🪙</div>
        
        <div id="result" class="result">--</div>
        
        <button id="tossBtn" class="toss-btn">TOSS COIN 🎲</button>
        
        <div class="stats">
            <div class="stat">
                <strong id="headsCount">Heads: 0</strong>
            </div>
            <div class="stat">
                <strong id="tailsCount">Tails: 0</strong>
            </div>
        </div>
        
        <button id="resetBtn" class="reset-btn">Reset Stats 🔄</button>
    </div>

    <script>
        const coin = document.getElementById('coin');
        const result = document.getElementById('result');
        const tossBtn = document.getElementById('tossBtn');
        const headsCountEl = document.getElementById('headsCount');
        const tailsCountEl = document.getElementById('tailsCount');
        const resetBtn = document.getElementById('resetBtn');

        let heads = 0;
        let tails = 0;
        let isTossing = false;

        function getRandomResult() {
            return Math.random() < 0.5 ? 'HEAD 🪙' : 'TAIL 🪙';
        }

        async function tossCoin() {
            if (isTossing) return;
            isTossing = true;

            // Spin animation
            coin.classList.add('spinning');
            result.textContent = 'TOSSING...';
            result.classList.remove('show');

            // Vibration if supported
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100]);
            }

            // Simulate toss time
            await new Promise(resolve => setTimeout(resolve, 1500));

            const outcome = getRandomResult();
            coin.classList.remove('spinning');
            coin.classList.add(outcome === 'HEAD 🪙' ? 'head' : 'tail');
            result.textContent = outcome;
            result.classList.add('show');

            // Update stats
            if (outcome === 'HEAD 🪙') {
                heads++;
                headsCountEl.textContent = `Heads: ${heads}`;
            } else {
                tails++;
                tailsCountEl.textContent = `Tails: ${tails}`;
            }

            setTimeout(() => {
                coin.classList.remove('head', 'tail');
                isTossing = false;
            }, 2000);
        }

        function resetStats() {
            heads = 0;
            tails = 0;
            headsCountEl.textContent = 'Heads: 0';
            tailsCountEl.textContent = 'Tails: 0';
            result.classList.remove('show');
            coin.classList.remove('head', 'tail', 'spinning');
        }

        tossBtn.addEventListener('click', tossCoin);
        resetBtn.addEventListener('click', resetStats);

        // Keyboard support
        document.addEventListener('keypress', (e) => {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                tossCoin();
            }
        });
    </script>
</body>
</html>
