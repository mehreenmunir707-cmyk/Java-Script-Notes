    <script>

         let id = document.getElementById("add")
            id.addEventListener("click", ()=>{
                let name = document.getElementById("name").value
                let rollno = document.getElementById("rollno").value
                let course = document.getElementById("course").value
                let image = document.getElementById("image").value
                console.log(name, rollno, course, image)
            })

           document.getElementById("card-img").src = image
            document.getElementById("card-name").textContent = `Name: ${name}`
            document.getElementById("card-roll").textContent = `Roll No: ${rollno}`
            document.getElementById("card-class").textContent = `Class: ${course}`


             if (image) {
    let reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById("card-img").src = e.target.result;
    }
    reader.readAsDataURL(image);
  }
